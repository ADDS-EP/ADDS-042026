<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="450" viewBox="0 0 1200 450"><rect width="1200" height="450" fill="white"/><text x="600" y="48" text-anchor="middle" font-size="28" font-family="Arial, Helvetica, sans-serif" fill="#111" font-weight="700">Sequenza operativa del setup</text><rect x="40" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="125" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">1. Verifica host</text><text x="125" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">virtualizzazione + Hyper-V</text><line x1="210" y1="210" x2="245" y2="210" stroke="#333" stroke-width="3"/><polygon points="245,210 233,202 233,218" fill="#333"/><rect x="230" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="315" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">2. Crea switch</text><text x="315" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">vLab-ADDS / vLab-CLUSTER</text><line x1="400" y1="210" x2="435" y2="210" stroke="#333" stroke-width="3"/><polygon points="435,210 423,202 423,218" fill="#333"/><rect x="420" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="505" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">3. Crea VM</text><text x="505" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">DC1 SRV1 CLIENT1 CLU1 CLU2</text><line x1="590" y1="210" x2="625" y2="210" stroke="#333" stroke-width="3"/><polygon points="625,210 613,202 613,218" fill="#333"/><rect x="610" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="695" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">4. Collega ISO</text><text x="695" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">e installa i sistemi</text><line x1="780" y1="210" x2="815" y2="210" stroke="#333" stroke-width="3"/><polygon points="815,210 803,202 803,218" fill="#333"/><rect x="800" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="885" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">5. Rinomina e IP</text><text x="885" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">configurazione di base</text><line x1="970" y1="210" x2="1005" y2="210" stroke="#333" stroke-width="3"/><polygon points="1005,210 993,202 993,218" fill="#333"/><rect x="990" y="130" width="170" height="160" rx="16" fill="#f7f7f7" stroke="#333" stroke-width="2"/><text x="1075" y="180" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">6. Crea VHDS e</text><text x="1075" y="208" text-anchor="middle" font-size="20" font-family="Arial, Helvetica, sans-serif" fill="#111">checkpoint finali</text><text x="600" y="365" text-anchor="middle" font-size="18" font-family="Arial, Helvetica, sans-serif" fill="#111">Ordine semplice, ripetibile e meno incline al caos tipico dei laboratori improvvisati.</text></svg>